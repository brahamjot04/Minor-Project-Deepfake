<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Face Classifier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div
      class="container d-flex flex-column justify-content-center align-items-center min-vh-100"
    >
      <div class="card shadow-lg p-4 w-100" style="max-width: 500px">
        <h1 class="text-center mb-4">Upload Image for Prediction</h1>

        <input
          type="file"
          class="form-control mb-3"
          id="imageInput"
          accept="image/*"
        />

        <button class="btn btn-primary w-100" onclick="uploadImage()">
          Predict
        </button>

        <div class="mt-4 text-center">
          <p id="result" class="fw-semibold fs-5 text-dark"></p>
        </div>
      </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
      async function uploadImage() {
        const input = document.getElementById("imageInput");
        const file = input.files[0];
        if (!file) {
          alert("Please select an image");
          return;
        }

        const formData = new FormData();
        formData.append("image", file);

        const response = await fetch("/predict", {
          method: "POST",
          body: formData,
        });

        const data = await response.json();
        document.getElementById(
          "result"
        ).innerText = `Prediction: ${data.prediction} (Confidence: ${data.confidence}%)`;
      }
    </script>
  </body>
</html>
